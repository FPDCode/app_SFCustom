<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SF Custom</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: var(--figma-color-bg, #ffffff);
    --fg: var(--figma-color-text, #1d1d1f);
    --fg-secondary: var(--figma-color-text-secondary, #6e6e73);
    --border: var(--figma-color-border, #e5e5ea);
    --tint: var(--figma-color-bg-brand, #007aff);
    --tint-text: var(--figma-color-text-onbrand, #ffffff);
    --surface: var(--figma-color-bg-secondary, #f5f5f7);
    --danger: var(--figma-color-bg-danger, #ff3b30);
    --success: #34c759;
  }
  body {
    margin: 0;
    padding: 0;
    font: 12px/1.4 -apple-system, "SF Pro Text", "Inter", system-ui, sans-serif;
    color: var(--fg);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 13px;
    font-weight: 600;
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--fg-secondary);
  }
  .status .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--fg-secondary);
  }
  .status.ok .dot { background: var(--success); }
  .status.err .dot { background: var(--danger); }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .preview {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    padding: 12px;
    min-height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .preview svg { max-width: 100%; max-height: 80px; display: block; }
  .empty {
    color: var(--fg-secondary);
    text-align: center;
    font-size: 11px;
    padding: 18px;
  }
  .form-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .form-row label {
    font-size: 11px;
    color: var(--fg-secondary);
  }
  .form-row input {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font: inherit;
    background: var(--bg);
    color: var(--fg);
    outline: none;
  }
  .form-row input:focus {
    border-color: var(--tint);
  }
  .error {
    color: var(--danger);
    font-size: 11px;
  }

  .sync {
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 6px;
    display: none;
    align-items: center;
    gap: 6px;
  }
  .sync:not(:empty) { display: flex; }
  .sync .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .sync.linked {
    background: rgba(52, 199, 89, 0.12);
    color: var(--success);
    border: 1px solid rgba(52, 199, 89, 0.3);
  }
  .sync.linked .dot { background: var(--success); }
  .sync.warning {
    background: rgba(255, 159, 10, 0.12);
    color: #ff9f0a;
    border: 1px solid rgba(255, 159, 10, 0.3);
  }
  .sync.warning .dot { background: #ff9f0a; }

  select {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    font: inherit;
    background: var(--bg);
    color: var(--fg);
    width: 100%;
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  footer button.primary {
    flex: 1;
    background: var(--tint);
    color: var(--tint-text);
    border: none;
    border-radius: 6px;
    padding: 8px 12px;
    font: inherit;
    font-weight: 500;
    cursor: pointer;
  }
  footer button.primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  footer button.secondary {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font: inherit;
    cursor: pointer;
  }
  .help {
    font-size: 11px;
    color: var(--fg-secondary);
    margin: 0;
  }
</style>
</head>
<body>
  <header>
    <h1>SF Custom</h1>
    <div id="bridge-status" class="status"><span class="dot"></span><span id="bridge-status-text">Checking bridge…</span></div>
  </header>
  <main>
    <div id="preview" class="preview"><div class="empty">Select an icon in Figma to preview it.</div></div>
    <div id="sync-state" class="sync"></div>
    <div class="form-row">
      <label for="icon-name">Icon name</label>
      <input id="icon-name" placeholder="e.g. radar" autocomplete="off" />
    </div>
    <div id="replace-row" class="form-row" style="display:none">
      <label for="replace-target">Replace existing icon</label>
      <select id="replace-target">
        <option value="">Choose icon to replace…</option>
      </select>
    </div>
    <p class="help">Strokes get outlined automatically so they survive font compilation. Re-sending the same Figma layer updates the linked icon — no duplicates.</p>
    <div id="error" class="error" style="display:none"></div>
  </main>
  <footer>
    <button id="send" class="primary" disabled>Send to SF Custom</button>
    <button id="close" class="secondary">Close</button>
  </footer>
<script>
/*__UI_JS__*/
</script>
</body>
</html>
