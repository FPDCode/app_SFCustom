<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 12px;
      color: #333;
      background: #fff;
      padding: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .header h2 { font-size: 14px; font-weight: 600; }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #888;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ccc;
    }
    .status-dot.connected { background: #34C759; }
    .status-dot.disconnected { background: #FF3B30; }

    .section {
      background: #f5f5f5;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    .selection-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .selection-name { font-weight: 600; }
    .selection-meta { font-size: 10px; color: #888; }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: #aaa;
    }

    .weight-mode {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .weight-mode button {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .weight-mode button.active {
      background: #007AFF;
      color: #fff;
      border-color: #007AFF;
    }
    .weight-mode button:hover:not(.active) {
      background: #f0f0f0;
    }

    .source-weight {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .source-weight button {
      flex: 1;
      padding: 4px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      font-size: 10px;
      cursor: pointer;
    }
    .source-weight button.active {
      background: #E8F0FE;
      border-color: #007AFF;
      color: #007AFF;
    }

    .btn-primary {
      width: 100%;
      padding: 10px;
      background: #007AFF;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #0066DD; }
    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-secondary {
      width: 100%;
      padding: 8px;
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-secondary:hover { background: #e8e8e8; }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin-top: 8px;
    }
    .preview-cell {
      aspect-ratio: 1;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-cell svg { width: 60%; height: 60%; }
    .preview-label {
      font-size: 9px;
      color: #aaa;
      text-align: center;
    }

    /* Captured-icon debug preview */
    .captured-preview {
      width: 100%;
      aspect-ratio: 1;
      max-height: 200px;
      background:
        linear-gradient(45deg, #f0f0f0 25%, transparent 25%) 0 0,
        linear-gradient(-45deg, #f0f0f0 25%, transparent 25%) 0 0,
        linear-gradient(45deg, transparent 75%, #f0f0f0 75%) 0 0,
        linear-gradient(-45deg, transparent 75%, #f0f0f0 75%) 0 0,
        #fff;
      background-size: 12px 12px;
      background-position: 0 0, 0 6px, 6px -6px, -6px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .captured-preview svg {
      max-width: 80%;
      max-height: 80%;
      width: auto;
      height: auto;
      color: #000;
    }
    .preview-meta {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #888;
      margin-top: 6px;
    }
    .preview-meta code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
    }

    .message {
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 11px;
    }
    .message.success { background: #E8F9E8; color: #1B7A1B; }
    .message.error { background: #FFE8E8; color: #CC0000; }

    .name-input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .tags-input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h2>SF Custom</h2>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Checking...</span>
    </div>
  </div>

  <!-- Message area -->
  <div id="messageArea"></div>

  <!-- Selection info -->
  <div class="section">
    <div class="section-title">Selection</div>
    <div id="selectionInfo" class="empty-state">
      Select a vector node in Figma
    </div>
  </div>

  <!-- Icon name -->
  <div id="captureControls" style="display:none;">

    <!-- Captured preview (debug) -->
    <div class="section">
      <div class="section-title">Captured Preview</div>
      <div class="captured-preview" id="capturedPreview"></div>
      <div class="preview-meta">
        <span id="previewPathCount">—</span>
        <span><code id="previewSize">—</code></span>
      </div>
    </div>

    <input type="text" class="name-input" id="iconName" placeholder="Icon name" />

    <!-- Weight mode -->
    <div class="section">
      <div class="section-title">Weight Mode</div>
      <div class="weight-mode">
        <button class="active" data-mode="uniform">Uniform</button>
        <button data-mode="single">Single + Gen</button>
        <button data-mode="full">Full Control</button>
      </div>
      <div id="sourceWeightPicker" style="display:none;">
        <div class="section-title" style="margin-top:8px;">Source Weight</div>
        <div class="source-weight">
          <button data-weight="ultralight">Ultralight</button>
          <button class="active" data-weight="regular">Regular</button>
          <button data-weight="black">Black</button>
        </div>
      </div>
    </div>

    <!-- Tags -->
    <input type="text" class="tags-input" id="iconTags" placeholder="Tags (comma separated)" />

    <!-- Actions -->
    <button class="btn-primary" id="sendBtn" style="margin-top:12px;">
      Send to SF Custom
    </button>
    <button class="btn-secondary" id="captureBtn">
      Re-capture Selection
    </button>
  </div>

  <!-- Initial capture button -->
  <button class="btn-primary" id="initialCaptureBtn" style="margin-top:12px;">
    Capture Icon
  </button>

  <script>
    // State
    let connected = false;
    let captured = null;
    let weightMode = 'uniform';
    let sourceWeight = 'regular';

    // Elements
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const selectionInfo = document.getElementById('selectionInfo');
    const captureControls = document.getElementById('captureControls');
    const initialCaptureBtn = document.getElementById('initialCaptureBtn');
    const captureBtn = document.getElementById('captureBtn');
    const sendBtn = document.getElementById('sendBtn');
    const iconName = document.getElementById('iconName');
    const iconTags = document.getElementById('iconTags');
    const messageArea = document.getElementById('messageArea');

    // Check connection to macOS app
    async function checkConnection() {
      try {
        const res = await fetch('http://localhost:8787/api/status');
        if (res.ok) {
          const data = await res.json();
          connected = true;
          statusDot.className = 'status-dot connected';
          statusText.textContent = `Connected (${data.iconCount} icons)`;
        } else {
          setDisconnected();
        }
      } catch {
        setDisconnected();
      }
    }

    function setDisconnected() {
      connected = false;
      statusDot.className = 'status-dot disconnected';
      statusText.textContent = 'App not running';
    }

    // Listen for messages from plugin code
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      switch (msg.type) {
        case 'selection':
          updateSelection(msg.data);
          break;
        case 'captured':
          handleCaptured(msg.data);
          break;
        case 'error':
          showMessage(msg.message, 'error');
          break;
      }
    };

    function updateSelection(data) {
      if (!data) {
        selectionInfo.innerHTML = '<div class="empty-state">Select a vector node in Figma</div>';
        initialCaptureBtn.disabled = true;
        return;
      }
      selectionInfo.innerHTML = `
        <div class="selection-info">
          <div>
            <div class="selection-name">${data.name}</div>
            <div class="selection-meta">${data.type} · ${Math.round(data.width)}×${Math.round(data.height)}px</div>
          </div>
        </div>
      `;
      initialCaptureBtn.disabled = !data.hasVector;
    }

    function handleCaptured(data) {
      captured = data;
      iconName.value = data.name || '';
      captureControls.style.display = 'block';
      initialCaptureBtn.style.display = 'none';
      renderCapturedPreview(data);
      showMessage('Icon captured successfully!', 'success');
    }

    function renderCapturedPreview(data) {
      const preview = document.getElementById('capturedPreview');
      const pathCount = document.getElementById('previewPathCount');
      const sizeLabel = document.getElementById('previewSize');

      const svg = data.fullSVG || '';
      // Strip <script> for safety even though Figma's exporter doesn't emit them.
      const safe = svg.replace(/<script[\s\S]*?<\/script>/gi, '');
      preview.innerHTML = safe;

      // Constrain the injected <svg> to fit the preview box.
      const svgEl = preview.querySelector('svg');
      if (svgEl) {
        svgEl.removeAttribute('width');
        svgEl.removeAttribute('height');
        svgEl.style.maxWidth = '80%';
        svgEl.style.maxHeight = '80%';
      }

      const paths = (svg.match(/<path\b/g) || []).length;
      pathCount.textContent = paths === 1 ? '1 path' : `${paths} paths`;
      sizeLabel.textContent = `${Math.round(data.width)}×${Math.round(data.height)}`;
    }

    async function sendToApp() {
      if (!captured || !connected) return;

      const payload = {
        name: iconName.value || captured.name,
        svgPath: captured.svgPath,
        fullSVG: captured.fullSVG,
        weightMode: weightMode,
        sourceWeight: weightMode === 'single' ? sourceWeight : undefined,
        tags: iconTags.value.split(',').map(t => t.trim()).filter(Boolean),
      };

      try {
        const res = await fetch('http://localhost:8787/api/icons', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data.success) {
          showMessage(`Icon "${data.name}" sent to SF Custom!`, 'success');
        } else {
          showMessage(data.error || 'Unknown error', 'error');
        }
      } catch (err) {
        showMessage(`Failed to send: ${err}`, 'error');
      }
    }

    function showMessage(text, type) {
      messageArea.innerHTML = `<div class="message ${type}">${text}</div>`;
      setTimeout(() => { messageArea.innerHTML = ''; }, 4000);
    }

    // Weight mode buttons
    document.querySelectorAll('.weight-mode button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.weight-mode button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        weightMode = btn.dataset.mode;
        document.getElementById('sourceWeightPicker').style.display =
          weightMode === 'single' ? 'block' : 'none';
      });
    });

    // Source weight buttons
    document.querySelectorAll('.source-weight button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.source-weight button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        sourceWeight = btn.dataset.weight;
      });
    });

    // Action buttons
    initialCaptureBtn.addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'capture-selection' } }, '*');
    });
    captureBtn.addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'capture-selection' } }, '*');
    });
    sendBtn.addEventListener('click', sendToApp);

    // Initial connection check + polling
    checkConnection();
    setInterval(checkConnection, 5000);
  </script>
</body>
</html>
